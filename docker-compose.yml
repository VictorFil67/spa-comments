version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spa-comments-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spa_comments
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: spa-comments-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spa-comments-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: spa_comments
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3010
      CORS_ORIGIN: http://localhost
    ports:
      - '3010:3010'
    depends_on:
      - postgres
      - redis
    volumes:
      - upload_data:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3010/api
        VITE_WS_URL: http://localhost:3010
    container_name: spa-comments-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  upload_data:
